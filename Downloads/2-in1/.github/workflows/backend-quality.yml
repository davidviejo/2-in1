name: backend-quality

on:
  pull_request:
    paths:
      - "backend/p2/**"
      - ".github/workflows/backend-quality.yml"
  push:
    branches: ["main", "master"]
    paths:
      - "backend/p2/**"
      - ".github/workflows/backend-quality.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/p2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/p2/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: make test
