{% extends "base.html" %}
{% block title %}Crawler{% endblock %}
{% block content %}
<div class="container-fluid">
    <h2>🗺️ Sitemap Crawler</h2>
    <input id="u" class="form-control mb-2" placeholder="https://miweb.com" />
    <button onclick="runCrawler()" class="btn btn-primary">Rastrear</button>
    <div id="res" class="mt-3"></div>
</div>
<script>
let urls = [];

async function runCrawler() {
    const target = document.getElementById('u').value.trim();
    if (!target) {
        document.getElementById('res').innerHTML = '<div class="alert alert-warning">Introduce una URL válida.</div>';
        return;
    }

    try {
        const response = await fetch('/crawler/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: target }),
        });
        const data = await response.json();

        if (!response.ok || data.error) {
            throw new Error(data.error || 'No se pudo completar el rastreo.');
        }

        urls = Array.isArray(data.urls) ? data.urls : [];
        document.getElementById('res').innerHTML = `
            <p>Encontradas: ${data.count ?? urls.length}</p>
            <textarea class="form-control" rows="10">${urls.join('\n')}</textarea>
            <button onclick="downloadXml()" class="btn btn-success mt-2" ${urls.length ? '' : 'disabled'}>XML</button>
        `;
    } catch (error) {
        document.getElementById('res').innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
    }
}

async function downloadXml() {
    if (!urls.length) return;

    const response = await fetch('/crawler/download_xml', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls }),
    });

    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'sitemap.xml';
    a.click();
    window.URL.revokeObjectURL(url);
}
</script>
{% endblock %}
